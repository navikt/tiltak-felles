name: Verifiser PR

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'

jobs:
  build-and-test:
    name: Build and verifiser
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'
      - name: Build and test
        run: mvn -B verify
